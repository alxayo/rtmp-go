# CI — runs on every push to main and on pull requests.
# Tests + vet + format check. Should complete in under 5 minutes.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25.1"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Unformatted files:"
            gofmt -l .
            exit 1
          fi

      - name: Unit tests
        run: go test -count=1 -timeout=5m ./internal/... ./cmd/...

      - name: Integration tests
        run: go test -count=1 -timeout=3m ./tests/integration/... || true

      - name: Build smoke test
        run: go build -o /dev/null ./cmd/rtmp-server
